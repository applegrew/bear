version: "3.8"

services:
  bear-relay:
    build: .
    ports:
      - "8080:8080"   # External API (internet-facing)
      - "8081:8081"   # Internal API (internal network only)
    volumes:
      - relay-data:/data
    environment:
      - PORT=8080
      - INTERNAL_PORT=8081
      - DB_PATH=/data/relay.db
    restart: unless-stopped

volumes:
  relay-data:
