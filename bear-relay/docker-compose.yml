version: "3.8"

services:
  bear-relay:
    build: .
    ports:
      - "8090:8080"   # External API (internet-facing)
      - "8091:8081"   # Internal API (internal network only)
    volumes:
      - relay-data:/data
    environment:
      - PORT=8080
      - INTERNAL_PORT=8081
      # Database backend: "sqlite" (default), "postgres", or "mysql"
      - DB_BACKEND=sqlite
      # SQLite file path (only used when DB_BACKEND=sqlite)
      - DB_PATH=/data/relay.db
      # Connection string for postgres/mysql (required when DB_BACKEND is not sqlite)
      # - DATABASE_URL=postgres://user:pass@host:5432/bear_relay
      # - DATABASE_URL=mysql://user:pass@host:3306/bear_relay
      # Connection pool size for postgres/mysql (default: 5)
      # - DB_POOL_SIZE=5
      # TURN server integration (shared secret with bear-turn / coturn)
      # - TURN_SECRET=your-shared-secret
      # - TURN_URLS=turn:turn.example.com:443,turn:turn.example.com:443?transport=tcp
      # - TURN_REALM=bear
      # - TURN_CREDENTIAL_TTL=86400
    restart: unless-stopped

volumes:
  relay-data:
