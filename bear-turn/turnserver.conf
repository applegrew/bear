# bear-turn — coturn configuration
#
# This config is used as a template. The init container in Kubernetes
# patches PLACEHOLDER, TURN_UDP_EXTERNAL_IP, and TURN_POD_IP
# with actual values at deploy time.

# Realm for TURN authentication
realm=bear

# Use long-term credential mechanism with shared secret (TURN REST API)
use-auth-secret
static-auth-secret=PLACEHOLDER

# Listening port — use 443 for both UDP and TCP.
# Port 443 is more mobile-friendly than 3478: most carriers allow UDP 443
# through their firewalls, enabling UDP TURN instead of TCP TURN.
# TCP TURN is fragile on mobile — brief network hiccups cause TCP resets
# which kill the TURN allocation instantly.
listening-port=443
alt-listening-port=0
alt-tls-listening-port=0

# Listener IP — bind to all interfaces
listening-ip=0.0.0.0

# Relay IP — use the pod IP (all interfaces)
relay-ip=0.0.0.0

# External IP mapping — patched by init container
# Format: external-ip=EXTERNAL/INTERNAL so coturn maps the LB IP to the pod IP.
# This is critical: without the /INTERNAL part, coturn blocks CREATE_PERMISSION
# for its own external-ip, preventing relay↔relay on the same server.
external-ip=TURN_UDP_EXTERNAL_IP/TURN_POD_IP

# Relay port range
min-port=49152
max-port=65535

# Fingerprint for STUN messages
fingerprint

# Enable verbose logging
verbose

# Don't use TLS (we terminate TLS at the LB or use plain TCP on 443)
no-tls
no-dtls

# Disable CLI
no-cli

# Log to stdout
log-file=stdout

# Total allocation quota per user
user-quota=20
total-quota=200

# Longer lifetimes improve TCP TURN resilience on mobile.
# Channel bindings survive 20min (default 600s), permissions 10min (default 300s).
channel-lifetime=1200
permission-lifetime=600

# Allow peers with private/loopback IPs. In GKE, kube-proxy SNAT makes
# client addresses appear as internal IPs (10.128.x.x), which coturn
# blocks by default. This is safe because the TURN server is only
# accessible via the LoadBalancer.
allow-loopback-peers
no-multicast-peers
allowed-peer-ip=0.0.0.0-255.255.255.255
no-dynamic-ip-list
