version: "3.8"

services:
  bear-turn:
    build: .
    ports:
      - "443:443/udp"     # TURN over UDP (primary — preferred by all clients)
      - "443:443/tcp"     # TURN over TCP (fallback when UDP is blocked)
    volumes:
      - ./turnserver.conf:/etc/turnserver.conf:ro
    restart: unless-stopped
