<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bear — Browser Terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: #1a1b26; overflow: hidden; }
  #terminal-container {
    width: 100%;
    height: 100%;
    padding: 4px;
  }
  /* Override xterm viewport background to match theme */
  .xterm { height: 100%; }
</style>
</head>
<body>
<div id="terminal-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
<script type="module">
import { BearClient } from '../bearjs/bear.js';

// Tokyo Night theme for xterm.js
const theme = {
  background:  '#1a1b26',
  foreground:  '#c0caf5',
  cursor:      '#7aa2f7',
  cursorAccent:'#1a1b26',
  selectionBackground: 'rgba(40, 52, 87, 0.6)',
  black:       '#15161e',
  red:         '#f7768e',
  green:       '#9ece6a',
  yellow:      '#e0af68',
  blue:        '#7aa2f7',
  magenta:     '#bb9af7',
  cyan:        '#73daca',
  white:       '#c0caf5',
  brightBlack: '#565f89',
  brightRed:   '#f7768e',
  brightGreen: '#9ece6a',
  brightYellow:'#e0af68',
  brightBlue:  '#7aa2f7',
  brightMagenta:'#bb9af7',
  brightCyan:  '#73daca',
  brightWhite: '#c0caf5',
};

const term = new Terminal({
  theme,
  fontFamily: "'JetBrains Mono', 'Fira Code', 'SF Mono', 'Cascadia Code', 'Consolas', monospace",
  fontSize: 14,
  lineHeight: 1.4,
  cursorBlink: true,
  cursorStyle: 'bar',
  scrollback: 0,
  allowProposedApi: true,
});

const fitAddon = new FitAddon.FitAddon();
const webLinksAddon = new WebLinksAddon.WebLinksAddon();

term.loadAddon(fitAddon);
term.loadAddon(webLinksAddon);

const container = document.getElementById('terminal-container');
term.open(container);
fitAddon.fit();

window.addEventListener('resize', () => fitAddon.fit());

const client = new BearClient(term, fitAddon);
client.boot();
</script>
</body>
</html>
